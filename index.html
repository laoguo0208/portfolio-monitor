<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>持仓监控</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;-webkit-text-size-adjust:100%}
.header{background:linear-gradient(135deg,#1a1a3e,#0f0f2a);padding:16px 20px;border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header h1{font-size:18px;color:#fff;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-actions{display:flex;gap:10px;align-items:center}
.icon-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#aaa;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:rgba(255,255,255,.15)}
.icon-btn.active{background:#3498db;color:#fff;border-color:#3498db}
.update-time{font-size:11px;color:#666}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.card{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.08)}
.card .label{font-size:11px;color:#888;margin-bottom:2px}
.card .value{font-size:17px;font-weight:700}
.card .value.up{color:#e74c3c}
.card .value.down{color:#2ecc71}

.container{padding:12px 16px 80px}
.table-wrapper{overflow-x:auto;border-radius:10px;border:1px solid #2a2a4a;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#141428}
th{padding:10px 6px;text-align:center;color:#888;font-weight:500;font-size:11px;white-space:nowrap;border-bottom:1px solid #2a2a4a}
td{padding:10px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
tr.alert-row{background:rgba(231,76,60,.08)}
tr:active{background:rgba(255,255,255,.05)}
.name-cell{text-align:left;font-weight:600}
.name-cell .code{display:block;font-size:10px;color:#666;font-weight:400;margin-top:1px}
.alert-badge{display:inline-block;background:#e74c3c;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.up{color:#e74c3c}
.down{color:#2ecc71}
.bold{font-weight:700}

.footer{text-align:center;padding:16px;color:#555;font-size:11px}
.loading{text-align:center;padding:60px 20px;color:#666;font-size:14px}
.loading .spinner{display:inline-block;width:24px;height:24px;border:2px solid #333;border-top-color:#3498db;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(231,76,60,.1);border:1px solid #e74c3c;border-radius:10px;padding:16px;margin:20px 0;text-align:center;color:#e74c3c}
.charts{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
.chart-box{background:#141428;border-radius:10px;padding:14px;border:1px solid #2a2a4a}
.chart-box h3{font-size:13px;margin-bottom:12px;color:#ccc}

/* 底部按钮组 */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,#0a0a1a 80%,transparent);padding:12px 20px 24px;display:flex;justify-content:center;gap:12px;z-index:200}
.bottom-btn{width:50px;height:50px;border-radius:50%;color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.bottom-btn.refresh{background:linear-gradient(135deg,#3498db,#2980b9)}
.bottom-btn.edit{background:linear-gradient(135deg,#e67e22,#d35400)}
.bottom-btn:active{transform:scale(.9)}
.bottom-btn.spinning{animation:spin .8s linear infinite}

/* ===== 编辑面板 ===== */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;animation:fadeIn .2s}
.overlay.show{display:flex;flex-direction:column;justify-content:flex-end}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.edit-panel{background:#1a1a2e;border-radius:20px 20px 0 0;padding:20px;max-height:75vh;overflow-y:auto;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.edit-panel h2{font-size:17px;color:#fff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.edit-panel h2 .close-btn{background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:0 4px}
.edit-row{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.edit-row .stock-info{flex:1;min-width:0}
.edit-row .stock-name{font-weight:600;font-size:15px;color:#e0e0e0}
.edit-row .stock-code{font-size:11px;color:#666;margin-top:2px}
.edit-row .shares-control{display:flex;align-items:center;gap:4px}
.shares-control button{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#e0e0e0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.shares-control button:active{background:rgba(255,255,255,.15)}
.shares-control input{width:80px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#e0e0e0;text-align:center;font-size:14px;font-weight:600;outline:none;-webkit-appearance:none}
.shares-control input:focus{border-color:#3498db}
.edit-row .delete-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(231,76,60,.3);background:rgba(231,76,60,.08);color:#e74c3c;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.edit-row .delete-btn:active{background:rgba(231,76,60,.2)}
.add-row{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)}
.add-row input{flex:1;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#e0e0e0;padding:0 12px;font-size:14px;outline:none;-webkit-appearance:none}
.add-row input:focus{border-color:#3498db}
.add-row input::placeholder{color:#555}
.add-row .add-btn{height:40px;padding:0 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.add-row .add-btn:active{opacity:.8}
.edit-actions{display:flex;gap:8px;margin-top:16px}
.edit-actions button{flex:1;height:42px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.edit-actions .save-btn{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.edit-actions .cancel-btn{background:rgba(255,255,255,.08);color:#aaa;border:1px solid rgba(255,255,255,.12)}
.edit-actions button:active{opacity:.8}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(46,204,113,.9);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:400;animation:toastAnim 2s forwards;pointer-events:none}
@keyframes toastAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}85%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
</style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h1><span class="dot" id="statusDot"></span>持仓监控</h1>
        <div class="header-actions">
            <button class="icon-btn" id="editToggle" onclick="toggleEditPanel()">✎</button>
        </div>
    </div>
    <div class="cards" id="summaryCards">
        <div class="card"><div class="label">总资产</div><div class="value" id="totalValue">--</div></div>
        <div class="card"><div class="label">今日浮盈</div><div class="value" id="totalPnl">--</div></div>
        <div class="card"><div class="label">组合涨幅</div><div class="value" id="totalPct">--</div></div>
        <div class="card"><div class="label">预警</div><div class="value" id="alertCount">--</div></div>
    </div>
</div>

<div class="container" id="mainContent">
    <div class="loading"><div class="spinner"></div><br>正在获取行情数据...</div>
</div>

<div class="bottom-bar">
    <button class="bottom-btn refresh" id="refreshBtn" onclick="refreshData()">↻</button>
    <button class="bottom-btn edit" onclick="toggleEditPanel()">✎</button>
</div>

<!-- 编辑面板 -->
<div class="overlay" id="editOverlay" onclick="closeEditIfOverlay(event)">
    <div class="edit-panel" id="editPanel">
        <h2>管理持仓 <button class="close-btn" onclick="closeEditPanel()">✕</button></h2>
        <div id="editList"></div>
        <div class="add-row">
            <input type="text" id="addCode" placeholder="输入股票代码 如600519" inputmode="numeric">
            <input type="number" id="addShares" placeholder="数量" inputmode="numeric">
            <button class="add-btn" onclick="addStock()">添加</button>
        </div>
        <div class="edit-actions">
            <button class="cancel-btn" onclick="closeEditPanel()">取消</button>
            <button class="save-btn" onclick="savePortfolio()">保存修改</button>
        </div>
    </div>
</div>

<script>
// ============ 持仓配置（localStorage持久化）============
const DEFAULT_PORTFOLIO = [
    { key: 'sz300751', name: '迈为股份', code: '300751', shares: 9300 },
    { key: 'sh688099', name: '晶晨股份', code: '688099', shares: 15000 },
    { key: 'sh688008', name: '澜起科技', code: '688008', shares: 10000 },
    { key: 'sh603019', name: '中科曙光', code: '603019', shares: 27500 },
    { key: 'sz301308', name: '江波龙',   code: '301308', shares: 1700 },
    { key: 'sz300223', name: '北京君正', code: '300223', shares: 30800 },
    { key: 'sz300170', name: '汉得信息', code: '300170', shares: 103400 },
];

function loadPortfolio() {
    const saved = localStorage.getItem('portfolio_config');
    if (saved) {
        try { return JSON.parse(saved); } catch(e) {}
    }
    return JSON.parse(JSON.stringify(DEFAULT_PORTFOLIO));
}

function savePortfolioConfig(data) {
    localStorage.setItem('portfolio_config', JSON.stringify(data));
}

let PORTFOLIO = loadPortfolio();
const ALERT_THRESHOLD = 3.0;
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#1abc9c','#e67e22','#9b59b6','#f39c12','#2ecc71'];

// ============ 股票代码自动识别市场前缀 ============
function getCodePrefix(code) {
    // 上交所：6开头或688开头
    if (code.startsWith('6')) return 'sh';
    // 深交所：0、3开头
    if (code.startsWith('0') || code.startsWith('3')) return 'sz';
    // 北交所：8开头
    if (code.startsWith('8')) return 'bj';
    return 'sz';
}

// ============ 数据获取 ============
function fetchQuotes() {
    return new Promise((resolve, reject) => {
        const codes = PORTFOLIO.map(s => s.key).join(',');
        const url = `https://qt.gtimg.cn/q=${codes}`;
        const script = document.createElement('script');

        script.src = url;
        script.onload = () => {
            setTimeout(() => {
                const results = {};
                PORTFOLIO.forEach(stock => {
                    const varName = 'v_' + stock.key;
                    const raw = window[varName];
                    if (raw) {
                        const parts = raw.split('~');
                        if (parts.length >= 40) {
                            results[stock.key] = {
                                name: parts[1],
                                price: parseFloat(parts[3]),
                                prevClose: parseFloat(parts[4]),
                                open: parseFloat(parts[5]),
                                volume: parseInt(parts[6]),
                                changeAmt: parseFloat(parts[31]) || 0,
                                changePct: parseFloat(parts[32]) || 0,
                                high: parseFloat(parts[33]) || parseFloat(parts[3]),
                                low: parseFloat(parts[34]) || parseFloat(parts[3]),
                                turnover: parseFloat(parts[38]) || 0,
                                pe: parseFloat(parts[39]) || 0,
                                amount: parseFloat(parts[37]) || 0,
                            };
                        }
                    }
                });
                script.remove();
                resolve(results);
            }, 500);
        };
        script.onerror = () => { script.remove(); reject(new Error('行情数据加载失败')); };
        document.head.appendChild(script);
    });
}

// ============ 渲染 ============
function render(quotes) {
    if (!quotes || Object.keys(quotes).length === 0) {
        document.getElementById('mainContent').innerHTML =
            '<div class="error-box">⚠️ 数据获取失败，请检查网络后刷新重试</div>';
        return;
    }

    const rows = [];
    let totalValue = 0, totalPnl = 0, totalPrev = 0, alertCount = 0;

    PORTFOLIO.forEach(stock => {
        const q = quotes[stock.key];
        if (!q) return;
        const value = q.price * stock.shares;
        const prevValue = q.prevClose * stock.shares;
        const pnl = value - prevValue;
        const isAlert = Math.abs(q.changePct) >= ALERT_THRESHOLD;
        if (isAlert) alertCount++;

        totalValue += value;
        totalPnl += pnl;
        totalPrev += prevValue;

        rows.push({ ...stock, ...q, value, prevValue, pnl, isAlert });
    });

    rows.sort((a, b) => b.value - a.value);
    const totalPct = totalPrev > 0 ? (totalPnl / totalPrev * 100) : 0;

    document.getElementById('totalValue').textContent = (totalValue / 10000).toFixed(1) + '万';
    const pnlEl = document.getElementById('totalPnl');
    pnlEl.textContent = (totalPnl > 0 ? '+' : '') + (totalPnl / 10000).toFixed(2) + '万';
    pnlEl.className = 'value ' + (totalPnl >= 0 ? 'up' : 'down');
    const pctEl = document.getElementById('totalPct');
    pctEl.textContent = (totalPct > 0 ? '+' : '') + totalPct.toFixed(2) + '%';
    pctEl.className = 'value ' + (totalPct >= 0 ? 'up' : 'down');
    const alertEl = document.getElementById('alertCount');
    alertEl.textContent = alertCount + '只';
    alertEl.style.color = alertCount > 0 ? '#e74c3c' : '#2ecc71';
    document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

    let tableHtml = `<div class="table-wrapper"><table>
        <thead><tr>
            <th>#</th><th>股票</th><th>现价</th><th>涨跌幅</th><th>持仓金额</th><th>今日盈亏</th>
        </tr></thead><tbody>`;

    rows.forEach((r, i) => {
        const cls = r.isAlert ? 'alert-row' : '';
        const pctCls = r.changePct > 0 ? 'up' : 'down';
        const badge = r.isAlert ? '<span class="alert-badge">📢</span>' : '';
        const pfx = r.changePct > 0 ? '+' : '';
        const pnlPfx = r.pnl > 0 ? '+' : '';

        tableHtml += `<tr class="${cls}">
            <td style="color:#666;font-size:11px">${i+1}</td>
            <td class="name-cell">${r.name}<span class="code">${r.code}</span>${badge}</td>
            <td style="font-weight:600">${r.price.toFixed(2)}</td>
            <td class="${pctCls} bold">${pfx}${r.changePct.toFixed(2)}%</td>
            <td>${(r.value/10000).toFixed(1)}万</td>
            <td class="${pctCls} bold">${pnlPfx}${(r.pnl/10000).toFixed(2)}万</td>
        </tr>`;
    });
    tableHtml += '</tbody></table></div>';

    const chartsHtml = `
    <div class="charts">
        <div class="chart-box"><h3>涨跌幅对比</h3><canvas id="barChart" height="220"></canvas></div>
        <div class="chart-box"><h3>今日盈亏贡献</h3><canvas id="pnlChart" height="220"></canvas></div>
        <div class="chart-box"><h3>持仓分布</h3><canvas id="pieChart" height="220"></canvas></div>
    </div>`;

    document.getElementById('mainContent').innerHTML = tableHtml + chartsHtml +
        '<div class="footer">数据来源：腾讯行情 | 手动刷新获取最新数据 | ⚠️ 仅供参考，不构成投资建议</div>';

    drawCharts(rows);
}

function drawCharts(rows) {
    if (typeof Chart === 'undefined') {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4';
        s.onload = () => setTimeout(() => drawCharts(rows), 100);
        document.head.appendChild(s);
        return;
    }
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: { labels: rows.map(r => r.name), datasets: [{ data: rows.map(r => r.changePct), backgroundColor: rows.map(r => r.isAlert ? '#e74c3c' : (r.changePct >= 0 ? '#3498db' : '#2ecc71')), borderRadius: 5, barPercentage: 0.6 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' }, ticks: { color: '#888', callback: v => v + '%' }}, x: { grid: { display: false }, ticks: { color: '#aaa', font: { size: 10 } } } } }
    });
    new Chart(document.getElementById('pnlChart'), {
        type: 'bar',
        data: { labels: rows.map(r => r.name), datasets: [{ data: rows.map(r => r.pnl / 10000), backgroundColor: rows.map(r => r.pnl >= 0 ? '#e74c3c' : '#2ecc71'), borderRadius: 5, barPercentage: 0.6 }] },
        options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#222' }, ticks: { color: '#888', callback: v => v + '万' }}, y: { grid: { display: false }, ticks: { color: '#aaa', font: { size: 10 } } } } }
    });
    new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: rows.map(r => r.name), datasets: [{ data: rows.map(r => r.value / 10000), backgroundColor: COLORS, borderWidth: 0 }] },
        options: { responsive: true, cutout: '55%', plugins: { legend: { position: 'bottom', labels: { color: '#aaa', padding: 10, font: { size: 10 } } } } }
    });
}

// ============ 刷新 ============
async function refreshData() {
    const btn = document.getElementById('refreshBtn');
    const dot = document.getElementById('statusDot');
    btn.classList.add('spinning');
    dot.style.background = '#f39c12';
    try {
        const quotes = await fetchQuotes();
        render(quotes);
        dot.style.background = '#2ecc71';
    } catch (e) {
        dot.style.background = '#e74c3c';
        document.getElementById('mainContent').innerHTML =
            '<div class="error-box">⚠️ 数据获取失败：' + e.message + '</div>';
    }
    btn.classList.remove('spinning');
}

// ============ 编辑面板 ============
let editData = []; // 编辑中的临时数据

function toggleEditPanel() {
    const overlay = document.getElementById('editOverlay');
    if (overlay.classList.contains('show')) {
        closeEditPanel();
    } else {
        openEditPanel();
    }
}

function openEditPanel() {
    editData = JSON.parse(JSON.stringify(PORTFOLIO)); // 深拷贝
    renderEditList();
    document.getElementById('editOverlay').classList.add('show');
    document.getElementById('editToggle').classList.add('active');
}

function closeEditPanel() {
    document.getElementById('editOverlay').classList.remove('show');
    document.getElementById('editToggle').classList.remove('active');
}

function closeEditIfOverlay(e) {
    if (e.target === document.getElementById('editOverlay')) closeEditPanel();
}

function renderEditList() {
    const list = document.getElementById('editList');
    let html = '';
    editData.forEach((stock, i) => {
        html += `
        <div class="edit-row">
            <div class="stock-info">
                <div class="stock-name">${stock.name}</div>
                <div class="stock-code">${stock.code}</div>
            </div>
            <div class="shares-control">
                <button onclick="adjustShares(${i}, -1000)">−</button>
                <input type="number" id="shares_${i}" value="${stock.shares}" onchange="updateShares(${i}, this.value)">
                <button onclick="adjustShares(${i}, 1000)">+</button>
            </div>
            <button class="delete-btn" onclick="deleteStock(${i})">✕</button>
        </div>`;
    });
    if (editData.length === 0) {
        html = '<div style="text-align:center;color:#666;padding:30px 0">暂无持仓，请添加股票</div>';
    }
    list.innerHTML = html;
}

function adjustShares(index, delta) {
    editData[index].shares = Math.max(0, editData[index].shares + delta);
    const input = document.getElementById('shares_' + index);
    if (input) input.value = editData[index].shares;
}

function updateShares(index, value) {
    editData[index].shares = Math.max(0, parseInt(value) || 0);
}

function deleteStock(index) {
    editData.splice(index, 1);
    renderEditList();
}

function addStock() {
    const codeInput = document.getElementById('addCode');
    const sharesInput = document.getElementById('addShares');
    const code = codeInput.value.trim();
    const shares = parseInt(sharesInput.value) || 0;

    if (!code || code.length < 6) {
        showToast('请输入6位股票代码', '#e74c3c');
        return;
    }
    if (shares <= 0) {
        showToast('请输入持有数量', '#e74c3c');
        return;
    }
    // 检查是否已存在
    if (editData.some(s => s.code === code)) {
        showToast('该股票已在持仓中', '#e74c3c');
        return;
    }

    const prefix = getCodePrefix(code);
    const key = prefix + code;

    // 先添加，名称暂时用代码代替，刷新行情后自动更新
    editData.push({ key, name: code, code, shares });
    codeInput.value = '';
    sharesInput.value = '';
    renderEditList();
    showToast('已添加，保存后生效', '#2ecc71');
}

function savePortfolio() {
    // 过滤掉数量为0的
    const filtered = editData.filter(s => s.shares > 0);
    if (filtered.length === 0) {
        showToast('至少保留一只股票', '#e74c3c');
        return;
    }
    PORTFOLIO = filtered;
    savePortfolioConfig(PORTFOLIO);
    closeEditPanel();
    showToast('持仓已更新', '#2ecc71');
    refreshData();
}

function showToast(msg, color) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    t.style.background = color || 'rgba(46,204,113,.9)';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
}

// ============ 初始化 ============
refreshData();

function isTradingTime() {
    const now = new Date();
    const day = now.getDay();
    if (day === 0 || day === 6) return false;
    const t = now.getHours() * 100 + now.getMinutes();
    return (930 <= t && t <= 1130) || (1300 <= t && t <= 1500);
}
setInterval(() => { if (isTradingTime()) refreshData(); }, 300000);
</script>
